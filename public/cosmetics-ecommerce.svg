<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750" fill="none">
  <defs>
    <linearGradient id="g" x1="120" y1="90" x2="1080" y2="660" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f5d0fe"/>
      <stop offset="0.4" stop-color="#bae6fd"/>
      <stop offset="1" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#34d399"/>
      <stop offset="0.45" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="b"/>
      <feOffset dy="10" result="o"/>
      <feColorMatrix in="o" type="matrix" values="0 0 0 0 0.03  0 0 0 0 0.09  0 0 0 0 0.14  0 0 0 0.2 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="750" fill="url(#g)"/>
  <rect x="70" y="70" width="1060" height="610" rx="28" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="70" y="70" width="1060" height="80" rx="28" fill="#041018"/>
  <rect x="70" y="122" width="1060" height="28" fill="#041018"/>
  <circle cx="118" cy="110" r="10" fill="#fb7185"/>
  <circle cx="150" cy="110" r="10" fill="#facc15"/>
  <circle cx="182" cy="110" r="10" fill="#4ade80"/>

  <text x="120" y="230" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="56" font-weight="800" fill="#0f172a">
    E-commerce cosmétiques
  </text>
  <text x="120" y="280" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="22" font-weight="500" fill="#334155">
    EJS · Express · MongoDB Atlas
  </text>

  <rect x="120" y="330" width="460" height="22" rx="11" fill="#e2e8f0"/>
  <rect x="120" y="365" width="520" height="22" rx="11" fill="#e2e8f0"/>
  <rect x="120" y="400" width="410" height="22" rx="11" fill="#e2e8f0"/>

  <rect x="120" y="470" width="210" height="52" rx="26" fill="url(#bar)"/>
  <text x="180" y="505" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="18" font-weight="700" fill="#041018">
    Demo
  </text>

  <rect x="700" y="210" width="360" height="430" rx="24" fill="#041018"/>
  <rect x="720" y="235" width="320" height="14" rx="7" fill="#0b2235"/>
  <rect x="720" y="265" width="180" height="14" rx="7" fill="#0b2235"/>
  <rect x="720" y="315" width="320" height="210" rx="18" fill="#0b2235"/>
  <rect x="720" y="545" width="150" height="80" rx="18" fill="#0b2235"/>
  <rect x="890" y="545" width="150" height="80" rx="18" fill="#0b2235"/>

  <circle cx="885" cy="420" r="64" fill="#0ea5e9" opacity="0.25"/>
  <circle cx="925" cy="460" r="44" fill="#34d399" opacity="0.22"/>
  <circle cx="840" cy="470" r="34" fill="#14b8a6" opacity="0.22"/>

  <text x="740" y="360" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="16" fill="#a7f3d0">
    /products?category=skincare
  </text>
  <text x="740" y="388" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace" font-size="16" fill="#93c5fd">
    render('catalog.ejs')
  </text>
</svg>
